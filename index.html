<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINOBI</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 8px #00ff66;
        }
        .terminal {
            text-align: left;
            border: 1px solid #00ff66;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            background: #000000;
            max-width: 650px;
            width: 90%;
            box-sizing: border-box;
        }
        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            color: #ffffff; 
            text-shadow: 0 0 10px #ffffff; 
            text-align: center; 
        }
        p { line-height: 1.6; margin: 10px 0; }
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 25px;
            border-top: 1px dashed rgba(0, 255, 102, 0.3);
            padding-top: 15px;
        }
        .prompt {
            color: #00ff66;
            margin-right: 10px;
            font-weight: bold;
        }
        #terminal-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
            text-shadow: 0 0 5px #ffffff;
        }
        #output {
            margin-top: 20px;
            font-weight: bold;
            white-space: pre-line;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>[ NETWORK NODE: RONIN ]</h1>        
        <p>You have successfully tracked the audio signal and established a direct connection.</p>        
        <p>The system is awaiting the secret access key to decrypt the second scroll fragment.</p>
        
        <div class="input-line">
            <span class="prompt">Ronin@Net:~$ Password:</span>
            <input type="text" id="terminal-input" autofocus autocomplete="off">
        </div>

        <div id="output"></div>
    </div>

    <script>
        const input = document.getElementById('terminal-input');
        const output = document.getElementById('output');

        document.addEventListener('click', () => input.focus());

        const KEY_ARR = [115, 97, 109, 121, 114, 97, 105, 64, 35, 36];
        const ANSWER_ARR = [117,103,103,99,102,58,47,47,99,110,102,103,114,111,118,97,46,112,98,122,47,122,100,76,122,81,108,81,99];

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                
                const userIn = input.value.trim();
                if (!userIn) return;

                const expectedKey = String.fromCharCode(...KEY_ARR);

                if (userIn === expectedKey) {
                    const decryptedText = String.fromCharCode(...ANSWER_ARR); 

                    output.style.color = "#00ff66";
                    output.innerHTML = `[+] SYNCHRONIZATION COMPLETE. DECRYPTING SCROLL...\n\n` +
                                       `The second part of the final link has been successfully extracted:\n` +
                                       `👉 ${decryptedText}\n\n` +
                                       `You are very close.`;
                    
                    input.disabled = true;
                    input.style.display = 'none';
                    document.querySelector('.prompt').innerHTML = `[ACCESS GRANTED]`;
                } else {
                    output.style.color = "#ff3333";
                    output.innerHTML = `[-] ERROR: Access key "${userIn}" rejected.\n[-] Status: Permission Denied.`;
                }

                input.value = '';
            }
        });
    </script>
</body>
</html>
