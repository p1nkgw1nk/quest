<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Врата Нео-Эдо</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 8px #00ff66;
        }
        .terminal {
            text-align: center;
            border: 1px solid #00ff66;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            background: #000000;
            max-width: 600px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; color: #ffffff; text-shadow: 0 0 10px #ffffff; }
        p { line-height: 1.6; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>[ СЕТЕВОЙ УЗЕЛ: РОНИНЫ ]</h1>
        <p>Вы успешно отследили аудиосигнал и пробили защитный периметр частот.</p>
        <p>Но свиток истины расколот на две части, чтобы скрыть финальную точку.</p>
        <p>Соедините этот осколок с тем, что хранит маска Мэнпо на первой картинке, и вы увидите скрытую тропу.</p>
        <p class="blink">> Ожидание ввода...</p>
    </div>

    </body>
</html>
