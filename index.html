<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONIN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cryptojs/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 8px #00ff66;
        }
        .terminal {
            text-align: left;
            border: 1px solid #00ff66;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            background: #000000;
            max-width: 650px;
            width: 90%;
            box-sizing: border-box;
        }
        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            color: #ffffff; 
            text-shadow: 0 0 10px #ffffff; 
            text-align: center; 
        }
        p { line-height: 1.6; margin: 10px 0; }
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 25px;
            border-top: 1px dashed rgba(0, 255, 102, 0.3);
            padding-top: 15px;
        }
        .prompt {
            color: #00ff66;
            margin-right: 10px;
            font-weight: bold;
        }
        #terminal-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
            text-shadow: 0 0 5px #ffffff;
        }
        #output {
            margin-top: 20px;
            font-weight: bold;
            white-space: pre-line;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>[ NETWORK NODE: RONIN ]</h1>        
        <p>You have successfully tracked the audio signal and established a direct connection.</p>        
        <p>The system is awaiting the secret access key to decrypt the second scroll fragment.</p>
        
        <div class="input-line">
      <span class="prompt">Ronin@Net:~$ enter_password:</span>
            <input type="text" id="terminal-input" autofocus autocomplete="off">
        </div>

        <div id="output"></div>
    </div>

    <script>
        const input = document.getElementById('terminal-input');
        const output = document.getElementById('output');

        document.addEventListener('click', () => input.focus());

        const ENCRYPTED_DATA = "U2FsdGVkX1+vGvEBlE/U0eT88uYAnI6rX2v3Y9rXhH9z9tQjS1M6Vp8qA2Fmsl7R0Q==";

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                
                const passwordValue = input.value.trim();
                if (!passwordValue) return;

                try {
                    let bytes = CryptoJS.AES.decrypt(ENCRYPTED_DATA, passwordValue);
                    let decryptedText = bytes.toString(CryptoJS.enc.Utf8);

                    if (decryptedText.startsWith("uggcf://")) {
                        output.style.color = "#00ff66";
                        output.innerHTML = `[+] SYNCHRONIZATION COMPLETE. DECRYPTING SCROLL...\n\n` +
                                           `The second part of the final link has been successfully extracted:\n` +
                                           `👉 ${decryptedText}\n\n` +
                                           `You are very close.`;
                        
                        input.disabled = true;
                        input.style.display = 'none';
                        document.querySelector('.prompt').innerHTML = `[ДОСТУП ПРЕДОСТАВЛЕН]`;
                    } else {
                        output.style.color = "#ff3333";
                        output.innerHTML = `[-] ОШИБКА: Ключ доступа "${passwordValue}" отвергнут.\n[-] Статус: Отказ в обслуживании.`;
                    }
                } catch (err) {
                    output.style.color = "#ff3333";
                    output.innerHTML = `[-] ОШИБКА: Ключ доступа "${passwordValue}" отвергнут.\n[-] Статус: Отказ в обслуживании.`;
                }

                input.value = '';
            }
        });
    </script>
</body>
</html>
