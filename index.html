<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONIN</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 8px #00ff66;
        }
        .terminal {
            text-align: left;
            border: 1px solid #00ff66;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            background: #000000;
            max-width: 650px;
            width: 90%;
            box-sizing: border-box;
        }
        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            color: #ffffff; 
            text-shadow: 0 0 10px #ffffff; 
            text-align: center; 
        }
        p { line-height: 1.6; margin: 10px 0; }
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 25px;
            border-top: 1px dashed rgba(0, 255, 102, 0.3);
            padding-top: 15px;
        }
        .prompt {
            color: #00ff66;
            margin-right: 10px;
            font-weight: bold;
        }
        #terminal-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
            text-shadow: 0 0 5px #ffffff;
        }
        #output {
            margin-top: 20px;
            font-weight: bold;
            white-space: pre-line;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>[ NETWORK NODE: RONIN ]</h1>        
        <p>You have successfully tracked the audio signal and established a direct connection.</p>        
        <p>The system is awaiting the secret access key to decrypt the second scroll fragment.</p>
        
        <div class="input-line">
            <span class="prompt">Ronin@Net:~$ Password:</span>
            <input type="text" id="terminal-input" autofocus autocomplete="off">
        </div>

        <div id="output"></div>
    </div>

    <script>
        const input = document.getElementById('terminal-input');
        const output = document.getElementById('output');

        document.addEventListener('click', () => input.focus());

        const PASS_H = "e9619a86b998cf777e3871ee22f87ee54f59ef8b29ff07bc137977464010b93a";
        const SECRET_ARR = [100,87,100,110,89,50,89,54,76,121,57,106,98,109,90,121,98,51,90,104,76,88,66,121,98,51,90,111,97,51,112,90,78,122,104,85,90,108,103,61];

        async function hashCheck(str) {
            const buffer = new TextEncoder().encode(str);
            const hash = await crypto.subtle.digest('SHA-256', buffer);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                
                const userIn = input.value;
                if (!userIn) return;

                const userHash = await hashCheck(userIn);

                if (userHash === PASS_H) {
                    const decryptedText = atob(String.fromCharCode(...SECRET_ARR)); 

                    output.style.color = "#00ff66";
                    output.innerHTML = `[+] SYNCHRONIZATION COMPLETE. DECRYPTING SCROLL...\n\n` +
                                       `The second part of the final link has been successfully extracted:\n` +
                                       `👉 ${decryptedText}\n\n` +
                                       `You are very close.`;
                    
                    input.disabled = true;
                    input.style.display = 'none';
                    document.querySelector('.prompt').innerHTML = `[ACCESS GRANTED]`;
                } else {
                    output.style.color = "#ff3333";
                    output.innerHTML = `[-] ERROR: Access key "${userIn}" rejected.\n[-] Status: Permission Denied.`;
                }

                input.value = '';
            }
        });
    </script>
</body>
</html>
